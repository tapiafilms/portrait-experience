<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050810" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Gen Experience by Genofy</title>
    <meta name="description" content="Gen Experience transforma a tus invitados en protagonistas del evento con retratos generados por IA en tiempo real." />
    <meta name="keywords" content="Gen Experience, Genofy, retrato IA, experiencia evento, tótem interactivo, AI portrait" />
    <meta property="og:title" content="Gen Experience by Genofy" />
    <meta property="og:description" content="Transforma a tus invitados en protagonistas del evento. Retratos con IA en menos de 30 segundos." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Gen Experience by Genofy" />
    <meta name="twitter:description" content="Transforma a tus invitados en protagonistas del evento. Retratos con IA en menos de 30 segundos." />
    <style>
      html, body {
        background: #050810;
        margin: 0;
        padding: 0;
        overscroll-behavior-y: auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(reg => {
            // Revisar actualizaciones cada vez que la app vuelve al foco
            document.addEventListener('visibilitychange', () => {
              if (document.visibilityState === 'visible') reg.update()
            })
            // Cuando hay nuevo SW listo, recargar automáticamente
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'activated') window.location.reload()
              })
            })
          })
        })
      }
    </script>
  </body>
</html>
